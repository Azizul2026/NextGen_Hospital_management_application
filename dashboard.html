<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - NextGen HMS</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="sidebar">
    <h2>🏥 NextGen HMS</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="#">Manage Patients</a>
    <a href="#">Manage Doctors</a>
    <a href="#">Appointments</a>
    <a href="index.html">Logout</a>
</div>
<div class="main">
    <div class="topbar">
        <h2>Welcome, Admin 👨‍💼</h2>
    </div>
    <div class="cards">
        <div class="card">
            <h3>Total Patients</h3>
            <p id="totalPatients">0</p>
        </div>
        <div class="card">
            <h3>Total Doctors</h3>
            <p>1</p>
        </div>

        <div class="card">
            <h3>Total Appointments</h3>
            <p>0</p>
        </div>
    </div>
    <div style="margin-top:40px;">
        <h3>Recent Patients</h3>
        <table border="1" width="100%" cellpadding="10" style="background:white; margin-top:10px;">
            <thead>
                <tr style="background:#0f9b8e; color:white;">
                    <th>ID</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>Disease</th>
                </tr>
            </thead>
            <tbody id="patientTable"></tbody>
        </table>
    </div>
</div>
<script>
async function loadPatients(){

const response = await fetch("http://127.0.0.1:5000/patients")
const data = await response.json()

let table = ""
let id = 1

data.forEach(p => {

table += `
<tr>
<td>${id++}</td>
<td>${p.name}</td>
<td>${p.age}</td>
<td>${p.cause}</td>
</tr>
`
})
document.getElementById("patientTable").innerHTML = table
document.getElementById("totalPatients").innerText = data.length
}
loadPatients()
</script>
</body>
</html>
